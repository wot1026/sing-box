name: Sync Loon rule files from Egern YAML

on:
  push:
    branches: [main]
    paths:
      - "Direct-Custom.yaml"
      - "Reject-Custom.yaml"
      - "Known-Global.yaml"
      - "scripts/convert_to_surge.py"
  workflow_dispatch: {}

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Create output directory
        run: mkdir -p loon

      - name: Convert YAML rule sets to Surge/Loon format
        run: |
          for name in Direct-Custom Reject-Custom Known-Global; do
            if [ -f "${name}.yaml" ]; then
              python3 scripts/convert_to_surge.py "${name}.yaml" "loon/${name}.list"
            fi
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loon/*.list
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync Loon rule files [skip ci]"
            git push
          fi